# Workflow for building and deploying a Vite React app to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the master branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build and Deploy job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Use a modern Node version
          cache: 'npm'

      # 2. Install dependencies (matches your npm i)
      - name: Install dependencies
        run: npm install

      # 3. Build the Vite project
      - name: Build project
        run: npm run build

      # 4. Setup GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # 5. Upload the 'dist' folder (this is where Vite outputs the static HTML)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'
          
      # 6. Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
